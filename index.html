<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thamer Almutairi</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Minecraft Font Integration -->
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --fg-primary: #FAFAFA;
            --fg-secondary: #A1A1AA;
            --fg-muted: #52525B;
            --border: #27272A;
            --border-hover: #3F3F46;
            --card-hover: #09090B;
            --accent: #10B981; /* Status dot green */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::selection {
            background-color: var(--fg-primary);
            color: var(--bg);
        }

        body {
            background-color: var(--bg);
            color: var(--fg-primary);
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 640px;
            padding: 10vh 2rem 4rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--fg-secondary);
            margin-bottom: -1rem;
            letter-spacing: -0.02em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background-color: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        /* Header */
        header {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        h1 {
            font-family: 'Minecraft', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .age {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--fg-muted);
            letter-spacing: normal;
        }

        .roles {
            font-size: 0.95rem;
            color: var(--fg-secondary);
            letter-spacing: -0.01em;
        }

        /* Bio */
        .bio {
            font-size: 1.05rem;
            color: var(--fg-primary);
            letter-spacing: -0.02em;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
            color: var(--fg-secondary);
        }

        /* Lists Wrapper */
        .section-block {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-title {
            font-family: 'Minecraft', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--fg-muted);
        }

        .cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 1rem;
            background-color: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            background-color: var(--card-hover);
            border-color: var(--border-hover);
        }

        .card:focus-visible {
            outline: 2px solid var(--fg-muted);
            outline-offset: 2px;
        }

        .card-left {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }

        .card-title {
            font-family: 'Minecraft', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--fg-primary);
            letter-spacing: 0.02em;
        }

        .card-role {
            font-size: 0.875rem;
            color: var(--fg-secondary);
        }

        .card-meta {
            font-size: 0.875rem;
            color: var(--fg-muted);
        }

        .card-arrow {
            color: var(--fg-muted);
            font-size: 1rem;
            opacity: 0;
            transform: translateX(-4px) translateY(4px);
            transition: all 0.15s ease;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0) translateY(0);
            color: var(--fg-primary);
        }

        /* Minimal Certifications Grid */
        .certs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.75rem;
        }

        .cert-item {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--fg-secondary);
            text-align: center;
            letter-spacing: -0.02em;
            background-color: transparent;
            transition: all 0.15s ease;
        }

        .cert-item:hover {
            border-color: var(--border-hover);
            color: var(--fg-primary);
            background-color: var(--card-hover);
        }

        /* Socials */
        .socials {
            display: flex;
            flex-wrap: wrap;
            gap: 1.25rem;
            padding-top: 0.5rem;
        }

        .socials a {
            color: var(--fg-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            transition: color 0.15s ease;
        }

        .socials a:hover {
            color: var(--fg-primary);
        }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .container {
                padding-top: 8vh;
            }
            .card {
                flex-direction: column;
                gap: 0.25rem;
            }
            .card-arrow {
                display: none;
            }
            .card-meta {
                margin-top: 0.25rem;
            }
            .certs-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <main class="container">
        
        <!-- Local Time & Status -->
        <div class="status-bar">
            <div class="status-dot"></div>
            <span>Kuwait City &bull; <span id="local-time">--:--</span></span>
        </div>
        
        <!-- Header Profile -->
        <header>
            <h1>Thamer Almutairi <span class="age">(17)</span></h1>
            <p class="roles">Developer, Security Researcher & Penetration Tester</p>
        </header>
        
        <!-- Biography -->
        <section class="bio">
            <p>I love hacking <span class="mono">&lt;;</span></p>
        </section>
        
        <!-- Projects / Ventures Section -->
        <div class="section-block">
            <span class="section-title">Initiatives</span>
            <section class="cards-wrapper">
                
                <a href="stack.html" class="card">
                    <div class="card-left">
                        <span class="card-title">STACK</span>
                        <span class="card-role">Founder</span>
                    </div>
                    <div class="card-meta">ETA 2026 <span class="card-arrow">↗</span></div>
                </a>
                                
                <a href="https://x.com/pwnthecity" class="card">
                    <div class="card-left">
                        <span class="card-title">PwnTheCity</span>
                        <span class="card-role">Co-Founder</span>
                    </div>
                    <div class="card-meta">Cybersecurity <span class="card-arrow">↗</span></div>
                </a>
                
            </section>
        </div>
        
        <!-- Certifications Section -->
        <div class="section-block">
            <span class="section-title">Certifications</span>
            <section class="certs-grid">
                <div class="cert-item">eWPTXv3</div>
                <div class="cert-item">eCPPTv3</div>
                <div class="cert-item">eJPTv2</div>
                <div class="cert-item">PT1</div>
                <div class="cert-item">CRTA</div>
            </section>
        </div>
        
        <!-- Social Footer Links -->
        <section class="socials">
            <a href="https://x.com/sliusx" target="_blank" rel="noopener noreferrer">Twitter</a>
            <a href="https://www.linkedin.com/in/thamer-almutairi-676582309/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a href="https://www.youtube.com/@ur.." target="_blank" rel="noopener noreferrer">YouTube</a>
            <a href="https://www.instagram.com/0xth4mer/" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://www.tiktok.com/@itkilh" target="_blank" rel="noopener noreferrer">TikTok</a>
        </section>
        
    </main>

    <script>
        // Update Local Time for Kuwait (UTC+3)
        function updateTime() {
            const timeElement = document.getElementById('local-time');
            const now = new Date();
                        
            const options = { 
                timeZone: 'Asia/Kuwait', 
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: true 
            };
                        
            timeElement.textContent = new Intl.DateTimeFormat('en-US', options).format(now);
        }
        
        updateTime();
        setInterval(updateTime, 1000);

        // Smooth interaction for empty links
        document.querySelectorAll('a[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
            });
        });
    </script>
</body>
</html>
